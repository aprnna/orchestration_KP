version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: academic_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: academic_db
      MYSQL_USER: academic_user
      MYSQL_PASSWORD: academic_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - academic_network

  frontend:
    image: aprnna/academic-frontend:latest
    container_name: academic_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: academic_db
      DB_USER: academic_user
      DB_PASS: academic_pass
      APP_NAME: Academic Research Scraper
      BASE_URL: http://localhost:8080/
      API_URL: http://backend:8000
      API_KEY: "${API_KEY}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_REDIRECT_URI: http://localhost:8080/auth/google/callback
    volumes:
      - ./KP-Penelitian-Dosen:/var/www/html
    networks:
      - academic_network

  backend:
    image: aprnna/academic-backend:latest
    container_name: academic_scraper
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: academic_db
      DB_USER: academic_user
      DB_PASSWORD: academic_pass
      API_KEY: "${API_KEY}"
      SCHEDULER_ENABLED: true
      SCRAPE_DAY_OF_MONTH: 1
      YEAR_START: 2021
      YEAR_END: 2026
      FILTER_UNIKOM: true
      ALLOWED_HOSTS: "*"
      ALLOWED_ORIGINS: "*"
      APP_NAME: Academic Research Scraper
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    networks:
      - academic_network

volumes:
  mysql_data:

networks:
  academic_network:
    driver: bridge
